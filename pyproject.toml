[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["F", "E", "W", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "sqlalchemy.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "langgraph.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "langchain_core.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "langchain_openai.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "pydantic_settings.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "app.core.config"
ignore_errors = true

[[tool.mypy.overrides]]
module = "app.models.*"
ignore_errors = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
